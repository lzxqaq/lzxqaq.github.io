<blockquote>
<h3 id="邀请">邀请</h3>
</blockquote>
<blockquote>
<p>你为生存做了些什么，我不关心；<br>
我想知道，<br>
你的追求，<br>
你是否敢于梦想去触碰你那内心的渴望。</p>
</blockquote>
<blockquote>
<p>你的年龄多大，我不关心；<br>
我想知道，<br>
你是否愿意像傻瓜一样不顾风险，<br>
为了爱，梦想活着就该有的冒险。</p>
</blockquote>
<blockquote>
<p>我想知道，<br>
你是否能享受快乐——我的或者你自己的，<br>
你是否能充满野性地舞蹈，让你从指端到足尖都被狂喜所充满，<br>
而不会告诫我们要小心、要现实、要记住做人的禁忌。</p>
</blockquote>
<blockquote>
<p>我想知道，<br>
你是否能孤独地面对你自己，<br>
你是否真正喜欢那个你独自一人时交谈的声音。</p>
</blockquote>
