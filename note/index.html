<script>
const musicContainer = document.getElementById("music-container")
const playBtn = document.getElementById("play")
const prevBtn = document.getElementById("prev")
const nextBtn = document.getElementById("next")

const audio = document.getElementById("audio")
const progress = document.getElementById("progress")
const progressContainer = document.getElementById("progress-container")
const title = document.getElementById("music-title")


var songs = new Array();


musicObj = {"name":"宗次郎 - いつも何度でも", "url":"https:\/\/cdn.jsdelivr.net\/gh\/lzxqaq\/jsdelivr@master\/music\/宗次郎%20-%20いつも何度でも.mp3"}
songs.push(musicObj);

musicObj = {"name":"岁月", "url":"https:\/\/cdn.jsdelivr.net\/gh\/lzxqaq\/jsdelivr@master\/music\/岁月.mp3"}
songs.push(musicObj);

musicObj = {"name":"张雨生 - 我的未来不是梦", "url":"https:\/\/cdn.jsdelivr.net\/gh\/lzxqaq\/jsdelivr@master\/music\/张雨生 - 我的未来不是梦.mp3"}
songs.push(musicObj);

musicObj = {"name":"自然卷 - How much", "url":"https:\/\/cdn.jsdelivr.net\/gh\/lzxqaq\/jsdelivr@master\/music\/自然卷%20-%20How%20much.mp3"}
songs.push(musicObj);


console.log(songs);
if(songs.length > 0) {
    
    let songIndex = 0;
    

    loadSong(songIndex)

    
    function loadSong(songIndex) {
        title.innerHTML = songs[songIndex].name;
        audio.src = songs[songIndex].url;      
    }

    
    function playSong() {
        
        musicContainer.classList.add("play")
        playBtn.querySelector('i.fas').classList.remove('fa-play')
        playBtn.querySelector('i.fas').classList.add('fa-pause')

        audio.play()
    }

    
    function pauseSong() {
        musicContainer.classList.remove('play');
        playBtn.querySelector('i.fas').classList.add('fa-play');
        playBtn.querySelector('i.fas').classList.remove('fa-pause');

        audio.pause();
    }

    
    function prevSong() {
        songIndex--
        if (songIndex < 0) {
            songIndex = songs.length - 1
        }
        
        loadSong(songIndex)
        playSong()
    }
    
    function  nextSong() {
        songIndex++;

        if (songIndex > songs.length - 1) {
            songIndex = 0;
        }

        loadSong(songIndex);

        playSong();
    }

    
    function updateProgress(e) {
        
        
        
        const {
            duration,
            currentTime
        } = e.target;
        
        
        
        
        const progressPercent = (currentTime / duration) * 100
        
        progress.style.width = `${progressPercent}%`
    }
    
    function setProgress(e) {
        
        const width = thzis.clientWidth
        
        const clickX = e.offsetX

        
        const duration = audio.duration

        
        audio.currentTime = (clickX / width) * duration
    }
    
    
    playBtn.onclick = function () {
        
        musicContainer.classList.contains('play') ? pauseSong() : playSong()
    }
    
    prevBtn.onclick = prevSong
    nextBtn.onclick = nextSong

    
    
    progressContainer.onclick = setProgress
    
    audio.ontimeupdate = updateProgress
    
    audio.onended = nextSong
}



</script>
