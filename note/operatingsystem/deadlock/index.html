    <h3 id="必要条件">必要条件</h3>
<ul>
<li>互斥：每个资源要么已经分配给了一个进程，要么就是不可用的。</li>
<li>占有和等待：已经得到了某个资源的进程可以再请求心的资源。</li>
<li>不可抢占：已经分配给一个进程的资源不能强制性地被抢占，它只能被占有它的进程显式地释放。</li>
<li>环路等待：有两个或者两个以上的进程组成一条环路，该环路中的每个进程都在等待下一个进程所占有的资源。</li>
</ul>
